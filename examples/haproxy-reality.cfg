# HAProxy snippet for routing Reality traffic via Google SNI
# Add this to your /etc/haproxy/haproxy.cfg

frontend ft_ssl
    bind *:443
    mode tcp
    tcp-request inspect-delay 5s
    tcp-request content accept if { req_ssl_hello_type 1 }

    # Route dl.google.com SNI to Hiddify's Xray Reality inbound
    use_backend bk_xray_reality if { req_ssl_sni -i dl.google.com }

    # Default: pass to Hiddify panel
    default_backend bk_hiddify

backend bk_xray_reality
    mode tcp
    server xray 127.0.0.1:9443 check

backend bk_hiddify
    mode tcp
    server hiddify 127.0.0.1:9000 check
